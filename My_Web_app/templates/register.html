<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AgriNex</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-cream: #f6f5f0;
      --surface-white: #ffffff;
      --primary-green: #1b4d2c;
      --border-color: rgba(27, 77, 44, 0.08);
      --font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-cream);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-card {
      background: var(--surface-white);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(27, 77, 44, 0.05);
      width: 100%;
      max-width: 420px;
      padding: 45px 35px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
    }

    .btn-register {
      background: var(--primary-green);
      color: #ffffff;
      border-radius: 12px;
      padding: 13px;
      transition: 0.3s;
    }

    .btn-register:hover {
      background: #143a21;
    }
  </style>
</head>
<body>

<div class="register-card text-center">
  <div class="mb-4">
    <h2 class="fw-bold" style="color: var(--primary-green);">Create Account</h2>
    <p class="text-muted">Join the AgriNex team as a Collector</p>
  </div>

  <form action="/register" method="POST">
    <div class="mb-3 text-start">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
    </div>

    <div class="mb-4 text-start">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" placeholder="Create a password" required>
    </div>

    <button type="submit" class="btn btn-register w-100 fw-bold">
      <i class="fas fa-user-plus me-2"></i> Register Now
    </button>

    <div class="mt-3 text-center">
      <small class="text-muted">Already have an account? 
        <a href="/login" class="text-decoration-none fw-bold" style="color: var(--primary-green);">Login here</a>
      </small>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
