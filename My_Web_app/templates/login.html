<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AgriNex</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/Design sans titre.svg') }}">
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────────────────────────────────────
       AGRINEX LIGHT AGRICULTURAL THEME
       ───────────────────────────────────────────────────────────────────────── */
    :root {
      --bg-cream: #f6f5f0;           /* Soft light cream background */
      --surface-white: #ffffff;      /* Clean white surfaces */
      --primary-green: #1b4d2c;      /* Deep agricultural green */
      --leaf-green: #2ecc71;         /* Natural leaf green */
      --text-dark: #1b261e;          /* Clean dark text */
      --text-muted: #627267;         /* Sage-charcoal muted text */
      --border-color: rgba(27, 77, 44, 0.08); /* Soft organic borders */
      --font-family: 'Outfit', 'Segoe UI', -apple-system, sans-serif;
      --card-shadow: 0 15px 40px rgba(27, 77, 44, 0.05), 0 2px 10px rgba(0, 0, 0, 0.02);
    }

    body {
      background-color: var(--bg-cream);
      color: var(--text-dark);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient natural background gradient glow */
    body::before {
      content: "";
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at 50% 30%, rgba(46, 204, 113, 0.06), transparent 60%);
      z-index: -1;
      pointer-events: none;
    }

    /* Elegant login card */
    .login-card {
      background: var(--surface-white) !important;
      border: 1px solid var(--border-color) !important;
      border-radius: 20px !important;
      box-shadow: var(--card-shadow) !important;
      width: 100%;
      max-width: 420px;
      padding: 45px 35px;
      z-index: 10;
    }

    .brand-section i {
      color: var(--primary-green);
      font-size: 2.5rem;
      filter: drop-shadow(0 4px 10px rgba(27, 77, 44, 0.15));
      margin-bottom: 12px;
    }

    .brand-section h2 {
      letter-spacing: 0.5px;
      color: var(--primary-green);
    }

    .brand-section h2 span {
      color: var(--leaf-green);
      font-weight: 400;
    }

    .form-label {
      color: var(--text-dark);
      font-size: 0.88rem;
      font-weight: 600;
      margin-left: 2px;
      margin-bottom: 6px;
    }

    /* Modern cream-tinted light inputs */
    .input-group-text {
      background-color: #fcfbfa !important;
      border: 1px solid var(--border-color) !important;
      border-right: none !important;
      color: var(--text-muted) !important;
      border-radius: 12px 0 0 12px;
      font-size: 0.95rem;
    }

    .form-control, .form-select {
      background-color: #fdfdfc !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-dark) !important;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
    }

    /* Align fields containing side icons */
    .input-group .form-control, .input-group .form-select {
      border-radius: 0 12px 12px 0;
      border-left: none !important;
    }

    .form-control::placeholder {
      color: #a0aba2;
      font-weight: 300;
    }

    /* Soft forest-green glow on focus */
    .form-control:focus, .form-select:focus {
      border-color: var(--primary-green) !important;
      box-shadow: 0 0 0 4px rgba(27, 77, 44, 0.08) !important;
    }
    
    .input-group:focus-within .input-group-text {
      border-color: var(--primary-green) !important;
    }

    .form-select option {
      background-color: var(--surface-white);
      color: var(--text-dark);
    }

    /* Premium forest green button */
    .btn-login {
      background: var(--primary-green) !important;
      color: #ffffff !important;
      font-weight: 600 !important;
      border: none !important;
      border-radius: 12px !important;
      padding: 13px;
      font-size: 1rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(27, 77, 44, 0.15);
    }

    .btn-login:hover {
      background: #143a21 !important;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(27, 77, 44, 0.25);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Elegant custom warning alert */
    .alert-custom {
      background: #fdf2f2;
      border: 1px solid #fbd5d5;
      color: #9b1c1c;
      border-radius: 12px;
      font-size: 0.88rem;
      padding: 12px;
    }
  </style>
</head>
<body>

<div class="login-card text-center">
  <div class="brand-section mb-4">
    <div class="mb-2 d-flex flex-column align-items-center gap-2">
      <img src="{{ url_for('static', filename='images/Design sans titre.svg') }}" alt="AgriNex Icon" style="height: 60px; width: auto;">
      <h2 class="fw-bold m-0" style="font-size: 1.95rem; color: var(--primary-green); letter-spacing: 0.5px;">AgriNex</h2>
    </div>
    <p class="text-muted small mt-2" style="font-size: 0.88rem; font-weight: 500; color: var(--primary-green); opacity: 0.85;">Where Agriculture Meets AI and GIS</p>
  </div>

  {% if error %}
  <div class="alert-custom mb-4 text-center">
    <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
  </div>
  {% endif %}

  <form action="/login" method="POST">
    
    <div class="mb-3 text-start">
      <label for="role" class="form-label">User Type</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
        <select class="form-select" id="role" name="role" required>
          <option value="" disabled selected>Choose a role...</option>
          <option value="admin">👨‍💼 Admin</option>
          <option value="collector">🌾 Collector</option>
        </select>
      </div>
    </div>

    <div class="mb-3 text-start">
      <label for="username" class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autocomplete="off">
      </div>
    </div>

    <div class="mb-4 text-start">
      <label for="password" class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
      </div>
    </div>

    <button type="submit" class="btn btn-login w-100 fw-bold mt-2">
      <i class="fas fa-sign-in-alt me-2"></i> Sign In
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered successfully:', reg.scope))
        .catch(err => console.error('Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>
