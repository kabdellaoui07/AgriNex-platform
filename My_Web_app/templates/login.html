<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AgriNex</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo-agrinex.png') }}">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-cream: #f6f5f0;
      --surface-white: #ffffff;
      --primary-green: #1b4d2c;
      --leaf-green: #2ecc71;
      --text-dark: #1b261e;
      --text-muted: #627267;
      --border-color: rgba(27, 77, 44, 0.08);
      --font-family: 'Outfit', sans-serif;
      --card-shadow: 0 15px 40px rgba(27, 77, 44, 0.05);
    }

    body {
      background-color: var(--bg-cream);
      color: var(--text-dark);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }

    .login-card {
      background: var(--surface-white);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      width: 100%;
      max-width: 420px;
      padding: 45px 35px;
    }

    .form-control, .form-select {
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
    }

    .btn-login {
      background: var(--primary-green);
      color: #ffffff;
      border-radius: 12px;
      padding: 13px;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #143a21;
    }

    .alert-custom {
      background: #fdf2f2;
      border: 1px solid #fbd5d5;
      color: #9b1c1c;
      border-radius: 12px;
      padding: 10px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="login-card text-center">
  <div class="brand-section mb-4">
    <img src="{{ url_for('static', filename='images/logo-agrinex.png') }}" alt="AgriNex" style="height: 60px;">
    <h2 class="fw-bold mt-2" style="color: var(--primary-green);">AgriNex</h2>
  </div>

  {% if error %}
  <div class="alert-custom mb-3">
    <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
  </div>
  {% endif %}

  <form action="/login" method="POST">
    <div class="mb-3 text-start">
      <label class="form-label">User Type</label>
      <select class="form-select" name="role" required>
        <option value="" disabled selected>Choose a role...</option>
        <option value="admin">👨‍💼 Admin</option>
        <option value="collector">🌾 Collector</option>
      </select>
    </div>

    <div class="mb-3 text-start">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" name="username" placeholder="Enter username" required>
    </div>

    <div class="mb-4 text-start">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn btn-login w-100 fw-bold">Sign In</button>

    <div class="mt-3 text-center">
      <small class="text-muted">Don't have an account? 
        <a href="/register" class="text-decoration-none fw-bold" style="color: var(--primary-green);">Create account</a>
      </small>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
